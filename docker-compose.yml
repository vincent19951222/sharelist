version: '3.8'

services:
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: sharelist-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    restart: always

  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sharelist-frontend
    ports:
      - "3000:3000"
    # IMPORTANT: Next.js 'NEXT_PUBLIC_' variables are baked at BUILD time.
    # To change them, you must rebuild the image: docker-compose build --no-cache frontend
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_WS_URL=ws://localhost:8000
    depends_on:
      - backend
    restart: always

# Note: Supabase is an external service, so we don't need a database container here.
# The backend connects to Supabase via the connection string in backend/.env.
