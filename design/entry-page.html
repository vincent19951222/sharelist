<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShareList Entry Page</title>
    <link rel="stylesheet" href="./styles/prototype.css">
</head>
<body>
    <div class="app-container">
        <div class="page page-login">
            <div class="entry-shell">
                <section class="entry-hero-card">
                    <div class="entry-brand-row">
                        <div class="logo-box entry-logo-box">
                            <svg viewBox="0 0 24 24"><path d="M4 22V10l4-4v4h8V6l4 4v12H4zm2-2h12v-8h-2v4h-8v-4H6v8zm4-8h4V8h-4v4z"/></svg>
                        </div>
                        <div class="entry-brand-copy">
                            <span class="entry-kicker">ROOM TODO</span>
                            <h1 class="entry-title">Join Room</h1>
                        </div>
                    </div>

                    <div class="entry-hero-visual">
                        <img src="./todolist.png" alt="Room Todo preview">
                    </div>
                </section>

                <section class="entry-form-card">
                    <div class="entry-form-head">
                        <span class="section-title entry-form-title">ROOM ACCESS</span>
                    </div>

                    <div class="input-group">
                        <label>ROOM ID</label>
                        <div class="input-wrapper">
                            <svg viewBox="0 0 24 24"><path d="M12.65 10C11.83 7.67 9.61 6 7 6c-3.31 0-6 2.69-6 6s2.69 6 6 6c2.61 0 4.83-1.67 5.65-4H17v4h4v-4h2v-4H12.65zM7 14c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2z"/></svg>
                            <input type="text" placeholder="Enter code...">
                        </div>
                    </div>

                    <div class="input-group">
                        <label>YOUR NAME</label>
                        <div class="input-wrapper">
                            <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                            <input type="text" placeholder="Adventurer name">
                        </div>
                    </div>

                    <a class="btn-start" href="./room-page.html">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                        START QUEST
                    </a>
                </section>
            </div>
        </div>
    </div>
</body>
</html>
