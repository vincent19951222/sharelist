<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShareList Profile Page</title>
    <link rel="stylesheet" href="./styles/prototype.css">
</head>
<body>
    <div class="app-container">
        <div class="page page-profile">
            <div class="header-simple">
                <a class="btn-back" href="./room-page.html" aria-label="Go back">
                    <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="19" y1="12" x2="5" y2="12"></line>
                        <polyline points="12 19 5 12 12 5"></polyline>
                    </svg>
                </a>
                <h2>Profile</h2>
            </div>

            <div class="profile-body">
                <section class="profile-hero">
                    <div class="profile-hero-top">
                        <div class="profile-user">
                            <div class="profile-avatar">
                                <img src="https://i.pravatar.cc/160?u=cat" alt="Profile avatar">
                            </div>
                            <div class="profile-user-copy">
                                <span class="profile-kicker">PLAYER PROFILE</span>
                                <h3>PixelCat</h3>
                            </div>
                        </div>
                        <span class="profile-rank">Rank A</span>
                    </div>

                    <div class="profile-total-panel">
                        <span class="profile-total-label">Total Coins</span>
                        <div class="profile-total-value">
                            <span class="profile-coin-badge">
                                <span class="coin-icon"></span>
                            </span>
                            <strong>1,280</strong>
                        </div>
                    </div>

                    <div class="profile-stats-row">
                        <div class="profile-stat-card">
                            <span class="profile-stat-label">This Week</span>
                            <strong>140</strong>
                            <span class="profile-stat-note">+7 quests</span>
                        </div>
                        <div class="profile-stat-card">
                            <span class="profile-stat-label">This Month</span>
                            <strong>420</strong>
                            <span class="profile-stat-note">+19 quests</span>
                        </div>
                    </div>
                </section>

                <section class="profile-history">
                    <div class="section-bar profile-section-bar">
                        <div class="section-title">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="12" cy="12" r="9"></circle>
                                <polyline points="12 7 12 12 15 15"></polyline>
                            </svg>
                            HISTORY LOG
                        </div>
                    </div>

                    <div class="history-list">
                        <article class="history-item">
                            <div class="history-line"></div>
                            <div class="history-dot"></div>
                            <div class="history-content">
                                <div class="history-top">
                                    <div>
                                        <h4>Finish the project mockup</h4>
                                        <p>Today · 21:10</p>
                                    </div>
                                    <span class="history-gp">+25 GP</span>
                                </div>
                            </div>
                        </article>

                        <article class="history-item">
                            <div class="history-line"></div>
                            <div class="history-dot"></div>
                            <div class="history-content">
                                <div class="history-top">
                                    <div>
                                        <h4>Buy almond milk</h4>
                                        <p>Today · 18:42</p>
                                    </div>
                                    <span class="history-gp">+10 GP</span>
                                </div>
                            </div>
                        </article>

                        <article class="history-item">
                            <div class="history-line"></div>
                            <div class="history-dot"></div>
                            <div class="history-content">
                                <div class="history-top">
                                    <div>
                                        <h4>Walk the dog</h4>
                                        <p>Yesterday · 08:15</p>
                                    </div>
                                    <span class="history-gp">+15 GP</span>
                                </div>
                            </div>
                        </article>

                        <article class="history-item">
                            <div class="history-dot"></div>
                            <div class="history-content">
                                <div class="history-top">
                                    <div>
                                        <h4>Plan weekend trip</h4>
                                        <p>Mar 20 · 17:26</p>
                                    </div>
                                    <span class="history-gp">+30 GP</span>
                                </div>
                            </div>
                        </article>
                    </div>
                </section>
            </div>
        </div>
    </div>
</body>
</html>
