<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShareList Design Index</title>
    <link rel="stylesheet" href="./styles/prototype.css">
</head>
<body class="design-index-body">
    <main class="design-index">
        <div class="design-index-header">
            <span class="design-kicker">Prototype Index</span>
            <h1>ShareList 页面原型</h1>
            <p>当前原型已拆成独立页面，后续新增页面继续按同样方式单独放置即可。</p>
        </div>

        <div class="design-grid">
            <a class="design-card" href="./entry-page.html">
                <span class="design-card-label">Page 1</span>
                <strong>入口页</strong>
                <p>昵称输入、房间码输入、进入房间的首屏体验。</p>
            </a>

            <a class="design-card" href="./room-page.html">
                <span class="design-card-label">Page 2</span>
                <strong>房间 Todo 页</strong>
                <p>房间信息、多人协作列表、底部新增输入区。</p>
            </a>

            <a class="design-card" href="./auto-quest-page.html">
                <span class="design-card-label">Page 3</span>
                <strong>Auto Quests 页</strong>
                <p>自动任务列表、重复周期展示，以及底部新增入口。</p>
            </a>

            <a class="design-card" href="./profile-page.html">
                <span class="design-card-label">Page 4</span>
                <strong>Profile 页</strong>
                <p>个人积分统计、周/月数据，以及完成 quest 的历史时间线。</p>
            </a>
        </div>
    </main>
</body>
</html>
