<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShareList Auto Quests Page</title>
    <link rel="stylesheet" href="./styles/prototype.css">
</head>
<body>
    <div class="app-container">
        <div class="page page-auto-quest">
            <div class="header-simple">
                <a class="btn-back" href="./room-page.html" aria-label="Go back">
                    <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="19" y1="12" x2="5" y2="12"></line>
                        <polyline points="12 19 5 12 12 5"></polyline>
                    </svg>
                </a>
                <h2>Auto Quests</h2>
            </div>

            <div class="auto-quest-stage">
                <div class="aq-stack">
                    <article class="aq-card-large aq-editable-card" id="aq-card" tabindex="0" role="button" aria-label="Edit auto quest">
                        <div class="aq-card-copy">
                            <h3 class="aq-card-title" id="aq-card-title">jhjh</h3>

                            <div class="aq-meta-block">
                                <div class="task-gp" id="aq-card-gp">
                                    <div class="coin-icon"></div>
                                    +10 GP
                                </div>

                                <div class="aq-meta-line aq-repeat-line" id="aq-card-repeat">
                                    <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
                                        <path d="M21 12a9 9 0 0 1-15.5 6.36"></path>
                                        <polyline points="3 16 5.5 18.5 8 16"></polyline>
                                        <path d="M3 12a9 9 0 0 1 15.5-6.36"></path>
                                        <polyline points="21 8 18.5 5.5 16 8"></polyline>
                                    </svg>
                                    Wed
                                </div>
                            </div>
                        </div>

                        <div class="aq-toggle on" aria-hidden="true"></div>
                    </article>
                </div>
            </div>

            <div class="bottom-fixed-btn">
                <button class="btn-capsule" id="btn-open-aq-editor" type="button">
                    <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                    New Auto quest
                </button>
            </div>
        </div>
    </div>

    <div class="aq-editor-overlay" id="aq-editor-overlay" hidden></div>
    <div class="aq-editor-panel" id="aq-editor-panel" hidden>
        <div class="aq-editor-header">
            <div>
                <span class="aq-editor-kicker">Auto Quest</span>
                <h3 id="aq-editor-title">Edit Quest</h3>
            </div>
            <button class="aq-editor-close" id="aq-editor-close" type="button" aria-label="Close editor">
                <svg viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </button>
        </div>

        <div class="aq-form-field">
            <label for="aq-input-name">Quest Name</label>
            <input id="aq-input-name" class="aq-input" type="text" placeholder="Water plants">
        </div>

        <div class="aq-form-field">
            <label for="aq-input-gp">Reward</label>
            <select id="aq-input-gp" class="aq-input aq-select">
                <option value="10">10 GP</option>
                <option value="20">20 GP</option>
                <option value="30">30 GP</option>
                <option value="40">40 GP</option>
                <option value="50">50 GP</option>
            </select>
        </div>

        <div class="aq-form-field">
            <label>Repeat On</label>
            <div class="aq-day-grid" id="aq-day-grid">
                <button class="aq-day-btn" type="button" data-day="Sun">S</button>
                <button class="aq-day-btn" type="button" data-day="Mon">M</button>
                <button class="aq-day-btn" type="button" data-day="Tue">T</button>
                <button class="aq-day-btn" type="button" data-day="Wed">W</button>
                <button class="aq-day-btn" type="button" data-day="Thu">T</button>
                <button class="aq-day-btn" type="button" data-day="Fri">F</button>
                <button class="aq-day-btn" type="button" data-day="Sat">S</button>
            </div>
        </div>

        <button class="aq-save-btn" id="aq-save-btn" type="button">Save Changes</button>
    </div>

    <script>
        const aqState = {
            name: "jhjh",
            gp: "10",
            repeatDays: ["Wed"],
        };

        const aqCard = document.getElementById("aq-card");
        const aqCardTitle = document.getElementById("aq-card-title");
        const aqCardGp = document.getElementById("aq-card-gp");
        const aqCardRepeat = document.getElementById("aq-card-repeat");
        const aqEditorOverlay = document.getElementById("aq-editor-overlay");
        const aqEditorPanel = document.getElementById("aq-editor-panel");
        const aqEditorTitle = document.getElementById("aq-editor-title");
        const aqEditorClose = document.getElementById("aq-editor-close");
        const aqInputName = document.getElementById("aq-input-name");
        const aqInputGp = document.getElementById("aq-input-gp");
        const aqSaveBtn = document.getElementById("aq-save-btn");
        const aqDayButtons = Array.from(document.querySelectorAll(".aq-day-btn"));
        const btnOpenAqEditor = document.getElementById("btn-open-aq-editor");

        function formatRepeat(days) {
            if (!days.length) {
                return "Off";
            }

            if (days.length === 7) {
                return "Everyday";
            }

            return days.join(", ");
        }

        function renderAutoQuest() {
            aqCardTitle.textContent = aqState.name || "Untitled Quest";
            aqCardGp.innerHTML = '<div class="coin-icon"></div> +' + aqState.gp + " GP";
            aqCardRepeat.innerHTML = `
                <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 12a9 9 0 0 1-15.5 6.36"></path>
                    <polyline points="3 16 5.5 18.5 8 16"></polyline>
                    <path d="M3 12a9 9 0 0 1 15.5-6.36"></path>
                    <polyline points="21 8 18.5 5.5 16 8"></polyline>
                </svg>
                ${formatRepeat(aqState.repeatDays)}
            `;
        }

        function syncEditorFromState(modeTitle) {
            aqEditorTitle.textContent = modeTitle;
            aqInputName.value = aqState.name;
            aqInputGp.value = aqState.gp;

            aqDayButtons.forEach((button) => {
                button.classList.toggle("selected", aqState.repeatDays.includes(button.dataset.day));
            });
        }

        function openEditor(modeTitle) {
            syncEditorFromState(modeTitle);
            aqEditorOverlay.hidden = false;
            aqEditorPanel.hidden = false;
        }

        function closeEditor() {
            aqEditorOverlay.hidden = true;
            aqEditorPanel.hidden = true;
        }

        aqCard.addEventListener("click", () => openEditor("Edit Quest"));
        aqCard.addEventListener("keydown", (event) => {
            if (event.key === "Enter" || event.key === " ") {
                event.preventDefault();
                openEditor("Edit Quest");
            }
        });

        btnOpenAqEditor.addEventListener("click", () => openEditor("New Auto Quest"));
        aqEditorClose.addEventListener("click", closeEditor);
        aqEditorOverlay.addEventListener("click", closeEditor);

        aqDayButtons.forEach((button) => {
            button.addEventListener("click", () => {
                button.classList.toggle("selected");
            });
        });

        aqSaveBtn.addEventListener("click", () => {
            aqState.name = aqInputName.value.trim() || "Untitled Quest";
            aqState.gp = aqInputGp.value;
            aqState.repeatDays = aqDayButtons
                .filter((button) => button.classList.contains("selected"))
                .map((button) => button.dataset.day);

            renderAutoQuest();
            closeEditor();
        });

        document.addEventListener("keydown", (event) => {
            if (event.key === "Escape" && !aqEditorPanel.hidden) {
                closeEditor();
            }
        });

        renderAutoQuest();
    </script>
</body>
</html>
